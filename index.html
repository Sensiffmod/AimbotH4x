<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM TikTok - Hệ Thống Mạnh Nhất VN</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- CSS STYLE --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }

        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 1;
            top: 0;
            left: 0;
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        /* Panel chung */
        .panel {
            background: rgba(15, 15, 15, 0.95);
            backdrop-filter: blur(10px);
            padding: 25px;
            border-radius: 20px;
            border: 1px solid rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
            width: 100%;
            max-width: 450px;
            text-align: center;
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        h2, h1 {
            color: #00ff00;
            text-shadow: 0 0 15px rgba(0, 255, 0, 0.4);
        }

        /* Input & Button */
        .input-group { position: relative; margin-bottom: 15px; }
        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            color: #fff;
            border-radius: 10px;
            outline: none;
            box-sizing: border-box;
        }
        input:focus { border-color: #00ff00; box-shadow: 0 0 10px rgba(0, 255, 0, 0.2); }

        .btn-main {
            background: #00ff00; color: #000; border: none;
            padding: 14px; font-weight: bold; cursor: pointer;
            width: 100%; border-radius: 10px; text-transform: uppercase;
            transition: 0.3s;
        }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 5px 20px #00ff00; }

        /* Dashboard */
        #dashboard { display: none; width: 100%; max-width: 900px; text-align: center; }
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 15px;
        }
        .product-card {
            background: rgba(25, 25, 25, 0.8);
            border: 1px solid rgba(0, 255, 0, 0.15);
            padding: 35px 20px;
            border-radius: 15px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .product-card:hover { border-color: #00ff00; background: rgba(0, 255, 0, 0.05); }
        .product-card h3 { margin: 0; font-size: 1.1rem; }

        /* Detail & Servers */
        #service-detail { display: none; }
        .server-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }
        .server-item {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid #333;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.9rem;
        }
        .server-item.active {
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.1);
            color: #00ff00;
        }
        .back-btn {
            background: none; border: none; color: #888;
            padding: 10px; cursor: pointer; width: 100%; margin-top: 5px;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="container">
        <div id="login-box" class="panel">
            <h2>HỆ THỐNG SMM</h2>
            <div class="input-group">
                <input type="text" placeholder="Tên đăng nhập">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Mật khẩu">
                <i class="fas fa-eye" style="position:absolute; right:15px; top:15px; cursor:pointer; color:#666;" onclick="togglePass()"></i>
            </div>
            <button class="btn-main" onclick="login()">Đăng Nhập Ngay</button>
        </div>

        <div id="dashboard">
            <h1 style="margin-bottom:30px;">SMM TIKTOK VIỆT NAM 🇻🇳</h1>
            <div class="product-grid">
                <div class="product-card" onclick="openService('Tim')"><h3>1. Tăng Tim TikTok</h3></div>
                <div class="product-card" onclick="openService('Follow')"><h3>2. Tăng Follow TikTok</h3></div>
                <div class="product-card" onclick="openService('View')"><h3>3. Tăng View TikTok</h3></div>
                <div class="product-card" onclick="openService('Lưu')"><h3>4. Tăng Lưu TikTok</h3></div>
                <div class="product-card" onclick="openService('Share')"><h3>5. Tăng Share TikTok</h3></div>
                <div class="product-card" onclick="openService('Đăng Lại')"><h3>6. Tăng Đăng Lại TikTok</h3></div>
            </div>
        </div>

        <div id="service-detail" class="panel">
            <h2 id="service-title">Dịch Vụ</h2>
            <div class="server-grid">
                <div class="server-item active" onclick="selSv(this)"><b>Server 1</b><br><span class="sv-txt">Tây</span></div>
                <div class="server-item" onclick="selSv(this)"><b>Server 2</b><br><span class="sv-txt">Việt</span></div>
                <div class="server-item" onclick="selSv(this)"><b>Server 3</b><br><span class="sv-txt">Bot</span></div>
                <div class="server-item" onclick="selSv(this)"><b>Server 4</b><br><span class="sv-txt">Ảo</span></div>
            </div>
            <div class="input-group">
                <input type="text" placeholder="Nhập Link TikTok..." id="link">
            </div>
            <div class="input-group">
                <input type="number" placeholder="Số lượng cần tăng..." id="qty">
            </div>
            <button class="btn-main" onclick="order()">BẮT ĐẦU XỬ LÝ</button>
            <button class="back-btn" onclick="goBack()">Quay lại danh mục</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
    <script>
        // Cấu hình hạt bụi di chuyển chậm
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 90 },
                "color": { "value": "#00ff00" },
                "opacity": { "value": 0.2 },
                "size": { "value": 2 },
                "line_linked": { "enable": true, "distance": 150, "color": "#00ff00", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 0.6, "random": true, "out_mode": "out" }
            }
        });

        function togglePass() {
            const p = document.getElementById('password');
            p.type = p.type === 'password' ? 'text' : 'password';
        }

        function login() {
            alert("SMM Tiktok mạnh nhất Việt Nam 🇻🇳");
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        function openService(type) {
            document.getElementById('dashboard').style.display = 'none';
            document.getElementById('service-detail').style.display = 'block';
            document.getElementById('service-title').innerText = "Tăng " + type + " TikTok";
            
            // Cập nhật tên server (Ví dụ: Share Tây, Share Việt...)
            const txts = document.querySelectorAll('.sv-txt');
            txts.forEach(t => {
                const region = t.innerText.split(' ').pop(); // Lấy chữ Tây/Việt/Bot/Ảo
                t.innerText = type + " " + region;
            });
        }

        function selSv(el) {
            document.querySelectorAll('.server-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function goBack() {
            document.getElementById('service-detail').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }

        function order() {
            const l = document.getElementById('link').value;
            const q = document.getElementById('qty').value;
            if(l && q) alert("Hệ thống đã nhận đơn! Đang bắt đầu chạy...");
            else alert("Vui lòng điền đủ thông tin!");
        }
    </script>
</body>
</html>
