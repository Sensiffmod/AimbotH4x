<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMM TikTok - Security Pro</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; overflow: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; top: 0; left: 0; }
        
        /* Header chỉ hiện khi đã đăng nhập */
        .header { position: fixed; top: 0; left: 0; width: 100%; height: 55px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 255, 0, 0.2); z-index: 100; display: none; justify-content: space-between; align-items: center; padding: 0 15px; box-sizing: border-box; }
        .balance-area { background: rgba(0, 255, 0, 0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(0, 255, 0, 0.2); font-size: 13px; display: flex; align-items: center; gap: 5px; }
        
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #0a0a0a; border-right: 1px solid rgba(0, 255, 0, 0.2); z-index: 200; transition: 0.3s; padding: 20px; box-sizing: border-box; }
        .sidebar.active { left: 0; }
        .menu-item { padding: 15px 10px; border-bottom: 1px solid #1a1a1a; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 14px; }

        .container { position: relative; z-index: 2; padding: 70px 15px 20px; box-sizing: border-box; max-width: 500px; margin: 0 auto; height: 100vh; overflow-y: auto; }
        
        /* Auth Screen */
        #auth-screen { position: fixed; top:0; left:0; width:100%; height:100%; background:#050505; z-index: 1000; display: flex; align-items: center; justify-content: center; padding: 20px; box-sizing: border-box; }
        .auth-box { width: 100%; max-width: 350px; background: rgba(15, 15, 15, 0.95); border: 1px solid #00ff00; border-radius: 15px; padding: 25px; text-align: center; box-shadow: 0 0 20px rgba(0, 255, 0, 0.1); }

        /* Grid 2 hàng */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        .product-card { background: rgba(20, 20, 20, 0.8); border: 1px solid rgba(0, 255, 0, 0.2); padding: 20px 10px; border-radius: 12px; text-align: center; cursor: pointer; transition: 0.2s; }
        .product-card:active { transform: scale(0.95); background: rgba(0, 255, 0, 0.1); }

        .panel { background: rgba(15, 15, 15, 0.98); border-radius: 15px; border: 1px solid rgba(0, 255, 0, 0.3); padding: 15px; width: 100%; box-sizing: border-box; position: relative; margin-top: 10px; }
        .close-btn { position: absolute; top: 10px; right: 15px; color: #ff4444; font-size: 24px; cursor: pointer; }

        /* 4 Server Grid */
        .server-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin: 15px 0; }
        .server-item { background: rgba(255, 255, 255, 0.05); border: 1px solid #333; padding: 12px 5px; border-radius: 8px; cursor: pointer; font-size: 0.8rem; text-align: center; }
        .server-item.active { border-color: #00ff00; background: rgba(0, 255, 0, 0.1); color: #00ff00; }
        .server-item.disabled { opacity: 0.3; cursor: not-allowed; text-decoration: line-through; }

        input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #00ff00; border-radius: 8px; margin-bottom: 12px; box-sizing: border-box; outline: none; }
        .btn-main { background: #00ff00; color: #000; border: none; padding: 14px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        
        .price-info { background: rgba(255, 255, 0, 0.05); border: 1px dashed #444; padding: 10px; border-radius: 8px; margin-bottom: 15px; font-size: 13px; text-align: center; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 150; display: none; }
        
        #home, #service-detail, #admin-login, #admin-panel { display: none; }
    </style>
</head>
<body>

<div id="particles-js"></div>

<div id="auth-screen">
    <div class="auth-box">
        <h2 id="auth-title" style="color:#00ff00; margin-top:0;">ĐĂNG NHẬP</h2>
        <input type="text" id="auth-user" placeholder="Tên tài khoản...">
        <input type="password" id="auth-pass" placeholder="Mật khẩu...">
        <button class="btn-main" onclick="handleAuth()">VÀO HỆ THỐNG</button>
        <p id="auth-toggle" onclick="toggleAuth(true)" style="font-size:12px; color:#888; cursor:pointer; margin-top:15px; text-decoration:underline;">Chưa có tài khoản? Đăng ký</p>
    </div>
</div>

<div class="header" id="main-header">
    <div onclick="toggleSide()"><i class="fas fa-bars" style="color:#00ff00; font-size:20px; cursor:pointer;"></i></div>
    <div class="balance-area"><i class="fas fa-wallet" style="color:#00ff00;"></i> <span id="money">0</span>đ</div>
</div>

<div class="sidebar" id="side">
    <div style="color:#00ff00; font-weight:bold; margin-bottom:20px;" id="user-display">User: ...</div>
    <div class="menu-item" onclick="alert('Liên hệ Zalo Admin!')"><i class="fas fa-qrcode"></i> Nạp Tiền</div>
    <div class="menu-item" onclick="location.reload()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</div>
</div>

<div class="overlay" id="over" onclick="closeAll()"></div>

<div class="container">
    <div id="home">
        <h1 onclick="adClick()" style="text-align:center; color:#00ff00; font-size:1.4rem;">SMM TIKTOK VIỆT NAM 🇻🇳</h1>
        <div class="product-grid">
            <div class="product-card" onclick="openSv('Tim')">1. Tăng Tim</div>
            <div class="product-card" onclick="openSv('Follow')">2. Tăng Follow</div>
            <div class="product-card" onclick="openSv('View')">3. Tăng View</div>
            <div class="product-card" onclick="openSv('Lưu')">4. Tăng Lưu</div>
            <div class="product-card" onclick="openSv('Share')">5. Tăng Share</div>
            <div class="product-card" onclick="openSv('Đăng Lại')">6. Đăng Lại</div>
        </div>
    </div>

    <div id="service-detail" class="panel">
        <div class="close-btn" onclick="goHome()">×</div>
        <h2 id="sv-name" style="color:#00ff00; margin:0 0 10px 0; font-size:1.2rem;">Dịch vụ</h2>
        
        <div class="server-grid">
            <div class="server-item active" id="btn-tây" onclick="setReg(this, 'tây')">S1-Tây</div>
            <div class="server-item" id="btn-việt" onclick="setReg(this, 'việt')">S2-Việt</div>
            <div class="server-item" id="btn-bot" onclick="setReg(this, 'bot')">S3-Bot</div>
            <div class="server-item" id="btn-ảo" onclick="setReg(this, 'ảo')">S4-Ảo</div>
        </div>

        <div class="price-info">
            Giá: <span id="u-price" style="color:#00ff00; font-weight:bold;">0</span>đ | Min: <span id="u-min">0</span>
        </div>

        <input type="text" id="tk-link" placeholder="Dán link TikTok chuẩn...">
        <input type="number" id="tk-amount" placeholder="Nhập số lượng..." oninput="calc()">
        
        <div style="text-align:right; margin-bottom:15px; font-weight:bold;">
            TỔNG: <span id="total" style="color:#00ff00; font-size:1.2rem;">0</span>đ
        </div>
        <button class="btn-main" onclick="order()">MUA NGAY</button>
    </div>

    <div id="admin-login" class="panel">
        <div class="close-btn" onclick="goHome()">×</div>
        <h3>ADMIN ACCESS</h3>
        <input type="password" id="ad-pass" placeholder="Mật khẩu Admin...">
        <button class="btn-main" onclick="checkAd()">XÁC NHẬN</button>
    </div>

    <div id="admin-panel" class="panel">
        <div class="close-btn" onclick="goHome()">×</div>
        <h3>ADMIN PANEL</h3>
        <button class="btn-main" onclick="alert('Đã tạo mã!')">TẠO GIFTCODE</button>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS("particles-js", {"particles":{"number":{"value":40},"color":{"value":"#00ff00"},"size":{"value":2},"move":{"speed":0.5}}});

    const prices = {
        'Tim': { 'tây': 1, 'việt': 1.2, 'bot': 0.5, 'ảo': 0.6, min: 20 },
        'Follow': { 'việt': 23, 'tây': 13, 'bot': 5, 'ảo': 4, min: 20 },
        'View': { 'việt': 1.3, 'tây': 1.1, 'bot': 0.5, 'ảo': 0.2, min: 1000 },
        'Lưu': { 'việt': 1, 'tây': 1.2, 'bot': 'BT', 'ảo': 'BT', min: 30 },
        'Share': { 'việt': 0.5, 'tây': 1, 'bot': 0.3, 'ảo': 0.1, min: 20 },
        'Đăng Lại': { 'việt': 2.1, 'tây': 0.9, 'bot': 1.3, 'ảo': 0.3, min: 30 }
    };

    let curCat = '', curReg = 'tây', adCount = 0, isRegMode = false;

    // AUTH LOGIC
    function toggleAuth(reg) {
        isRegMode = reg;
        document.getElementById('auth-title').innerText = reg ? "ĐĂNG KÝ" : "ĐĂNG NHẬP";
        document.getElementById('auth-toggle').innerText = reg ? "Đã có tài khoản? Đăng nhập" : "Chưa có tài khoản? Đăng ký";
    }

    function handleAuth() {
        const u = document.getElementById('auth-user').value;
        const p = document.getElementById('auth-pass').value;
        if(!u || !p) return alert("Điền đủ thông tin!");

        if(isRegMode) {
            localStorage.setItem('u_'+u, p);
            alert("Đăng ký xong! Mời đăng nhập.");
            toggleAuth(false);
        } else {
            if(localStorage.getItem('u_'+u) === p) {
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('main-header').style.display = 'flex';
                document.getElementById('home').style.display = 'block';
                document.getElementById('user-display').innerText = "User: " + u;
            } else { alert("Sai thông tin!"); }
        }
    }

    // SERVICE LOGIC
    function openSv(cat) {
        curCat = cat; curReg = (prices[cat]['tây'] !== undefined) ? 'tây' : 'việt';
        document.getElementById('home').style.display = 'none';
        document.getElementById('service-detail').style.display = 'block';
        document.getElementById('sv-name').innerText = "Tăng " + cat;
        updateUI();
    }

    function setReg(el, reg) {
        if(prices[curCat][reg] === 'BT') return alert("Đang bảo trì!");
        curReg = reg;
        document.querySelectorAll('.server-item').forEach(i => i.classList.remove('active'));
        el.classList.add('active');
        updateUI();
    }

    function updateUI() {
        document.getElementById('u-price').innerText = prices[curCat][curReg];
        document.getElementById('u-min').innerText = prices[curCat].min;
        ['tây','việt','bot','ảo'].forEach(r => {
            const btn = document.getElementById('btn-'+r);
            if(prices[curCat][r] === 'BT' || prices[curCat][r] === undefined) btn.classList.add('disabled');
            else btn.classList.remove('disabled');
        });
        calc();
    }

    function calc() {
        let q = parseInt(document.getElementById('tk-amount').value) || 0;
        document.getElementById('total').innerText = (q * prices[curCat][curReg]).toLocaleString();
    }

    function order() {
        const link = document.getElementById('tk-link').value;
        if(!link.includes("tiktok.com")) return alert("Link TikTok không hợp lệ!");
        if(parseInt(document.getElementById('tk-amount').value) < prices[curCat].min) return alert("Chưa đủ số lượng tối thiểu!");
        alert("Đơn hàng đã được gửi!");
        goHome();
    }

    function goHome() {
        document.querySelectorAll('.panel, #home').forEach(e => e.style.display = 'none');
        document.getElementById('home').style.display = 'block';
    }

    function toggleSide() { 
        document.getElementById('side').classList.toggle('active');
        document.getElementById('over').style.display = document.getElementById('side').classList.contains('active') ? 'block' : 'none';
    }

    function closeAll() { document.querySelectorAll('.sidebar, .overlay').forEach(e => { e.style.display='none'; e.classList.remove('active'); }); }

    function adClick() { adCount++; if(adCount >= 10) { adCount=0; document.getElementById('home').style.display='none'; document.getElementById('admin-login').style.display='block'; } }
    function checkAd() { if(document.getElementById('ad-pass').value === "HuySMM@2026#Vip") { document.getElementById('admin-login').style.display='none'; document.getElementById('admin-panel').style.display='block'; } }
</script>
</body>
</html>
