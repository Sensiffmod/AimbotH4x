<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMM TikTok - Hệ Thống Mạnh Nhất VN</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- CSS STYLE --- */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #050505;
            color: #ffffff;
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            overflow-x: hidden;
        }

        /* Nền hạt bụi */
        #particles-js {
            position: fixed;
            width: 100%;
            height: 100%;
            z-index: 1;
            top: 0;
            left: 0;
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Panel chung */
        .panel {
            background: rgba(15, 15, 15, 0.85);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            border: 1px solid rgba(0, 255, 0, 0.3);
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: all 0.5s ease;
        }

        h2 {
            color: #00ff00;
            text-shadow: 0 0 10px rgba(0, 255, 0, 0.5);
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .input-group {
            position: relative;
            margin-bottom: 20px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid #333;
            color: #fff;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: #00ff00;
            background: rgba(0, 255, 0, 0.05);
        }

        /* Icon con mắt */
        .eye-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            cursor: pointer;
            color: #666;
            transition: 0.3s;
        }

        .eye-icon:hover { color: #00ff00; }

        .btn-main {
            background: #00ff00;
            color: #000;
            border: none;
            padding: 14px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            border-radius: 8px;
            text-transform: uppercase;
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 255, 0, 0.3);
        }

        .btn-main:hover {
            background: #05ff05;
            transform: scale(1.02);
            box-shadow: 0 0 20px #00ff00;
        }

        .links {
            margin-top: 20px;
            font-size: 14px;
        }

        .links a {
            color: #aaa;
            text-decoration: none;
            margin: 0 5px;
        }

        .links a:hover { color: #00ff00; }

        /* Màn hình Dashboard sau khi đăng nhập */
        #dashboard {
            display: none;
            width: 100%;
            max-width: 1000px;
            text-align: center;
            animation: fadeIn 1s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .glow-title {
            font-size: 2.5rem;
            color: #fff;
            text-shadow: 0 0 20px #00ff00;
            margin-bottom: 50px;
        }

        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }

        .product-card {
            background: rgba(20, 20, 20, 0.9);
            border: 1px solid rgba(0, 255, 0, 0.2);
            padding: 40px 20px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .product-card:hover {
            border-color: #00ff00;
            transform: translateY(-10px);
            box-shadow: 0 10px 30px rgba(0, 255, 0, 0.15);
            background: rgba(0, 255, 0, 0.05);
        }

        .product-card h3 {
            margin: 0;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .product-card::before {
            content: '✓';
            position: absolute;
            right: -20px;
            top: -20px;
            font-size: 5rem;
            color: rgba(0, 255, 0, 0.05);
        }

        @media (max-width: 600px) {
            .glow-title { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <div class="container">
        <div id="login-box" class="panel">
            <h2>HỆ THỐNG SMM</h2>
            <div class="input-group">
                <input type="text" placeholder="Tên đăng nhập" id="user">
            </div>
            <div class="input-group">
                <input type="password" id="password" placeholder="Mật khẩu">
                <i class="fas fa-eye eye-icon" id="togglePassword"></i>
            </div>
            <button class="btn-main" onclick="login()">ĐĂNG NHẬP NGAY</button>
            <div class="links">
                <a href="#">Đăng ký tài khoản</a> | <a href="#">Quên mật khẩu?</a>
            </div>
        </div>

        <div id="dashboard">
            <h1 class="glow-title">SMM TIKTOK MẠNH NHẤT VIỆT NAM 🇻🇳</h1>
            <div class="product-grid">
                <div class="product-card"><h3>1. Tăng Tim TikTok</h3></div>
                <div class="product-card"><h3>2. Tăng Follow TikTok</h3></div>
                <div class="product-card"><h3>3. Tăng View TikTok</h3></div>
                <div class="product-card"><h3>4. Tăng Lưu TikTok</h3></div>
                <div class="product-card"><h3>5. Tăng Share TikTok</h3></div>
                <div class="product-card"><h3>6. Tăng Đăng Lại TikTok</h3></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>

    <script>
        /* --- JAVASCRIPT --- */

        // 1. Cấu hình hiệu ứng hạt bụi chạy chậm
        particlesJS("particles-js", {
            "particles": {
                "number": { "value": 100, "density": { "enable": true, "value_area": 800 } },
                "color": { "value": "#00ff00" },
                "shape": { "type": "circle" },
                "opacity": { "value": 0.3, "random": true },
                "size": { "value": 2, "random": true },
                "line_linked": { "enable": true, "distance": 150, "color": "#00ff00", "opacity": 0.1, "width": 1 },
                "move": { "enable": true, "speed": 0.8, "direction": "none", "random": true, "straight": false, "out_mode": "out" }
            },
            "interactivity": {
                "events": { "onhover": { "enable": true, "mode": "grab" }, "onclick": { "enable": true, "mode": "push" } }
            }
        });

        // 2. Logic hiện/ẩn mật khẩu (Con mắt)
        const toggleBtn = document.querySelector('#togglePassword');
        const passwordInput = document.querySelector('#password');

        toggleBtn.addEventListener('click', function() {
            const type = passwordInput.getAttribute('type') === 'password' ? 'text' : 'password';
            passwordInput.setAttribute('type', type);
            this.classList.toggle('fa-eye-slash');
            this.classList.toggle('fa-eye');
        });

        // 3. Logic Đăng nhập & Hiện thông báo
        function login() {
            // Thông báo theo yêu cầu của bro
            alert("SMM Tiktok mạnh nhất Việt Nam 🇻🇳");
            
            // Chuyển sang màn hình sản phẩm
            document.getElementById('login-box').style.display = 'none';
            document.getElementById('dashboard').style.display = 'block';
        }
    </script>
</body>
</html>
