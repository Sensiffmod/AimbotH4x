<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SENSI PANEL - VIP MOD</title>
    <style>
        :root {
            --bg: #040814;
            --card: #0d1221;
            --green: #00ff73;
            --blue: #3b82f6;
            --text-dim: #94a3b8;
        }

        body {
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            margin: 0;
            overflow-x: hidden;
        }

        /* Menu Sidebar */
        .menu-btn { position: fixed; top: 20px; left: 20px; font-size: 24px; cursor: pointer; z-index: 1000; }
        .sidebar {
            height: 100%; width: 0; position: fixed; z-index: 2000;
            top: 0; left: 0; background-color: #0a0f1e;
            overflow-x: hidden; transition: 0.4s; padding-top: 60px;
            border-right: 1px solid #1e293b;
        }
        .sidebar a {
            padding: 15px 25px; text-decoration: none; font-size: 18px;
            color: #8b949e; display: block; transition: 0.3s;
        }
        .sidebar a:hover { color: var(--green); background: #161c2d; }
        .sidebar .closebtn { position: absolute; top: 10px; right: 25px; font-size: 36px; }

        .container { display: flex; flex-direction: column; align-items: center; padding: 70px 20px 20px; }

        .header-box {
            background: var(--card); width: 100%; max-width: 380px;
            padding: 15px; border-radius: 12px; display: flex; align-items: center;
            margin-bottom: 20px; border: 1px solid #1e293b;
        }
        .icon-box {
            width: 45px; height: 45px; background: linear-gradient(135deg, #3b82f6, #1d4ed8);
            border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: bold; margin-right: 15px;
        }

        /* Stats Panel (Cái mới) */
        .stats-container {
            background: var(--card); width: 100%; max-width: 380px;
            padding: 15px; border-radius: 15px; border: 1px solid #1e293b;
            margin-bottom: 15px; display: none; /* Hiện sau khi chọn máy */
        }
        .stat-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #161c2d; }
        .stat-val { color: var(--green); font-weight: bold; }

        /* Item Switch */
        .item {
            background: var(--card); width: 100%; max-width: 380px;
            padding: 12px 15px; border-radius: 12px; margin-bottom: 10px;
            display: flex; justify-content: space-between; align-items: center; border: 1px solid #1e293b;
        }

        /* Switch UI */
        .switch { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #334155; transition: .4s; border-radius: 20px;
        }
        .slider:before {
            position: absolute; content: ""; height: 16px; width: 16px;
            left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: var(--green); }
        input:checked + .slider:before { transform: translateX(18px); }

        .btn-green {
            width: 100%; background: var(--green); color: #000; border: none;
            border-radius: 8px; padding: 12px; font-weight: bold; cursor: pointer; margin-top: 10px;
        }
    </style>
</head>
<body>

<audio id="soundClick" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3"></audio>

<div class="menu-btn" onclick="openNav()">☰</div>

<div id="mySidebar" class="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">×</a>
    <a href="#" onclick="generateSensi('IPHONE VIP')">iPhone</a>
    <a href="#" onclick="generateSensi('SAMSUNG PRO')">Samsung</a>
    <a href="#" onclick="generateSensi('OPPO GAMING')">Oppo</a>
    <a href="#" onclick="generateSensi('VIVO S-LINK')">Vivo</a>
    <a href="#" onclick="generateSensi('XIAOMI MOD')">Xiaomi</a>
</div>

<div class="container">
    <div class="header-box">
        <div class="icon-box">H4X</div>
        <div>
            <h2 style="margin:0; font-size: 1rem;">SENSI PANEL</h2>
            <p id="deviceDisplay" style="margin:3px 0 0; font-size: 0.75rem; color:var(--green);">VUI LÒNG CHỌN MÁY ☰</p>
        </div>
    </div>

    <div id="statsPanel" class="stats-container">
        <div class="stat-row"><span>🌀 Nhìn xung quanh:</span> <span class="stat-val" id="val1">0</span></div>
        <div class="stat-row"><span>🔴 Red Dot:</span> <span class="stat-val" id="val2">0</span></div>
        <div class="stat-row"><span>🔭 Scope 2x:</span> <span class="stat-val" id="val3">0</span></div>
        <div class="stat-row"><span>🔭 Scope 4x:</span> <span class="stat-val" id="val4">0</span></div>
        <div class="stat-row"><span>🔥 Nút bắn:</span> <span class="stat-val" id="val5">0%</span></div>
    </div>

    <div class="item">
        <span>🔫 DESERT EAGLE</span>
        <label class="switch"><input type="checkbox" onchange="playSfx()"><span class="slider"></span></label>
    </div>
    <div class="item">
        <span>🔫 UMP TIỂU LIÊN</span>
        <label class="switch"><input type="checkbox" onchange="playSfx()"><span class="slider"></span></label>
    </div>
    <div class="item">
        <span>🎯 TÂM ẢO AIM</span>
        <label class="switch"><input type="checkbox" onchange="playSfx()"><span class="slider"></span></label>
    </div>

    <button class="btn-green" onclick="alert('Đã áp dụng thông số vào Game!')">ÁP DỤNG CẤU HÌNH</button>
</div>

<script>
    function openNav() { document.getElementById("mySidebar").style.width = "250px"; }
    function closeNav() { document.getElementById("mySidebar").style.width = "0"; }
    function playSfx() { document.getElementById('soundClick').play(); }

    function getRandom(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function generateSensi(deviceName) {
        // Hiện bảng thông số
        document.getElementById("statsPanel").style.display = "block";
        document.getElementById("deviceDisplay").innerText = "ĐANG DÙNG: " + deviceName;
        
        // Random từ 100 đến 200 cho 4 dòng đầu, riêng nút bắn random từ 30-60 cho chuẩn game
        document.getElementById("val1").innerText = getRandom(100, 200);
        document.getElementById("val2").innerText = getRandom(100, 200);
        document.getElementById("val3").innerText = getRandom(100, 200);
        document.getElementById("val4").innerText = getRandom(100, 200);
        document.getElementById("val5").innerText = getRandom(35, 55) + "%";

        playSfx();
        closeNav();
    }
</script>

</body>
</html>
