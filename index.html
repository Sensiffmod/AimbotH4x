<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SMM TikTok Pro - Hệ Thống Tài Khoản</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #050505; color: #ffffff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        #particles-js { position: fixed; width: 100%; height: 100%; z-index: 1; top: 0; left: 0; }
        .header { position: fixed; top: 0; left: 0; width: 100%; height: 55px; background: rgba(10, 10, 10, 0.9); backdrop-filter: blur(10px); border-bottom: 1px solid rgba(0, 255, 0, 0.2); z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 0 15px; box-sizing: border-box; }
        .balance-area { background: rgba(0, 255, 0, 0.1); padding: 5px 12px; border-radius: 20px; border: 1px solid rgba(0, 255, 0, 0.2); font-size: 13px; display: flex; align-items: center; gap: 5px; }
        
        /* Sidebar */
        .sidebar { position: fixed; top: 0; left: -280px; width: 260px; height: 100%; background: #0a0a0a; border-right: 1px solid rgba(0, 255, 0, 0.2); z-index: 200; transition: 0.3s; padding: 20px; box-sizing: border-box; }
        .sidebar.active { left: 0; }
        .user-info { padding: 15px; border-bottom: 1px solid #222; text-align: center; color: #00ff00; font-weight: bold; margin-bottom: 10px; }
        .menu-item { padding: 12px 10px; border-bottom: 1px solid #1a1a1a; cursor: pointer; display: flex; align-items: center; gap: 12px; font-size: 14px; }

        /* Giao diện 2 cột ngang */
        .product-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .product-card { background: rgba(20, 20, 20, 0.8); border: 1px solid rgba(0, 255, 0, 0.2); padding: 15px 5px; border-radius: 12px; text-align: center; cursor: pointer; font-size: 0.85rem; }
        
        /* Container & Auth */
        .container { position: relative; z-index: 2; padding: 70px 10px 20px; box-sizing: border-box; max-width: 500px; margin: 0 auto; }
        .auth-box { background: rgba(15, 15, 15, 0.95); border: 1px solid #00ff00; border-radius: 15px; padding: 25px; text-align: center; }
        
        .panel { background: rgba(15, 15, 15, 0.98); border-radius: 15px; border: 1px solid rgba(0, 255, 0, 0.3); padding: 15px; width: 100%; box-sizing: border-box; position: relative; }
        .close-btn { position: absolute; top: 10px; right: 15px; color: #ff4444; font-size: 20px; cursor: pointer; }
        
        input { width: 100%; padding: 12px; background: #111; border: 1px solid #333; color: #00ff00; border-radius: 8px; margin-bottom: 10px; box-sizing: border-box; outline: none; }
        .btn-main { background: #00ff00; color: #000; border: none; padding: 12px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; text-transform: uppercase; }
        .link-sub { font-size: 12px; color: #888; text-decoration: underline; cursor: pointer; margin-top: 5px; display: inline-block; }
        
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 150; display: none; }
        .popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 350px; background: #0a0a0a; padding: 20px; border-radius: 15px; border: 1px solid #00ff00; z-index: 300; display: none; text-align: center; }
        
        #home, #service-detail, #admin-panel, #admin-login, #auth-screen { display: none; }
    </style>
</head>
<body>

<div id="particles-js"></div>
<div class="header">
    <div onclick="toggleSide()"><i class="fas fa-bars" style="color:#00ff00; font-size:20px; cursor:pointer;"></i></div>
    <div class="balance-area"><i class="fas fa-wallet" style="color:#00ff00;"></i> <span id="money">0</span>đ</div>
</div>

<div class="sidebar" id="side">
    <div class="user-info"><i class="fas fa-user-circle"></i> <span id="display-name">Khách</span></div>
    <div class="menu-item" onclick="showPopup('qr-pop')"><i class="fas fa-qrcode"></i> Nạp Tiền QR</div>
    <div class="menu-item" onclick="showPopup('gift-pop')"><i class="fas fa-gift"></i> Nhập Giftcode</div>
    <div class="menu-item" onclick="logout()"><i class="fas fa-sign-out-alt"></i> Đăng xuất</div>
</div>

<div class="overlay" id="over" onclick="closeAll()"></div>

<div class="container">
    <div id="auth-screen" class="auth-box" style="display: block;">
        <h2 id="auth-title" style="color:#00ff00;">ĐĂNG NHẬP</h2>
        <input type="text" id="auth-user" placeholder="Tên tài khoản...">
        <input type="password" id="auth-pass" placeholder="Mật khẩu...">
        <button class="btn-main" id="btn-auth-action" onclick="handleAuth()">VÀO HỆ THỐNG</button>
        <div id="auth-switch">
            <span class="link-sub" onclick="toggleAuthMode(true)">Chưa có tài khoản? Đăng ký</span><br>
            <span class="link-sub" onclick="alert('Vui lòng liên hệ Admin Zalo để lấy lại mật khẩu!')">Quên mật khẩu?</span>
        </div>
    </div>

    <div id="home">
        <h1 onclick="adminClick()" style="text-align:center; color:#00ff00; font-size:1.3rem; text-shadow: 0 0 10px #00ff00;">SMM TIKTOK VIỆT NAM 🇻🇳</h1>
        <div class="product-grid">
            <div class="product-card" onclick="openSv('Tim')">1. Tăng Tim</div>
            <div class="product-card" onclick="openSv('Follow')">2. Tăng Follow</div>
            <div class="product-card" onclick="openSv('View')">3. Tăng View</div>
            <div class="product-card" onclick="openSv('Lưu')">4. Tăng Lưu</div>
            <div class="product-card" onclick="openSv('Share')">5. Tăng Share</div>
            <div class="product-card" onclick="openSv('Đăng Lại')">6. Đăng Lại</div>
        </div>
    </div>

    <div id="service-detail" class="panel">
        <div class="close-btn" onclick="goHome()">×</div>
        <h3 id="sv-title" style="color: #00ff00; margin-top:0;">Dịch vụ</h3>
        <input type="text" placeholder="Dán link TikTok (bắt buộc)..." id="link-tiktok">
        <input type="number" placeholder="Số lượng..." id="amount">
        <button class="btn-main" onclick="validateAndOrder()">THANH TOÁN ĐƠN</button>
    </div>

    <div id="admin-login" class="panel">
        <div class="close-btn" onclick="goHome()">×</div>
        <h3 style="text-align:center; color:#00ff00;">🔐 PASS ADMIN</h3>
        <input type="password" id="ad-pass">
        <button class="btn-main" onclick="checkAdmin()">VÀO</button>
    </div>

    <div id="admin-panel" class="panel">
        <div class="close-btn" onclick="goHome()">×</div>
        <h3 style="text-align:center; color:#00ff00;">🛠️ QUẢN TRỊ</h3>
        <button class="btn-main" onclick="alert('Đã tạo 2000 mã!')">TẠO 2000 MÃ CODE</button>
    </div>
</div>

<div class="popup" id="qr-pop">
    <img src="https://api.vietqr.io/image/970422-0397208110-v6S9k9m.jpg?accountName=NGUYEN%20QUOC%20HUY" style="width:100%; border-radius:10px;">
    <button onclick="closeAll()" class="btn-main" style="margin-top:10px; background:#333; color:#fff;">Đóng</button>
</div>

<script src="https://cdn.jsdelivr.net/particles.js/2.0.0/particles.min.js"></script>
<script>
    particlesJS("particles-js", {"particles":{"number":{"value":40},"color":{"value":"#00ff00"},"size":{"value":2},"move":{"speed":0.4}}});

    let isRegisterMode = false;
    let currentUser = null;
    let adCount = 0;

    // QUẢN LÝ TÀI KHOẢN
    function toggleAuthMode(isReg) {
        isRegisterMode = isReg;
        document.getElementById('auth-title').innerText = isReg ? "ĐĂNG KÝ" : "ĐĂNG NHẬP";
        document.getElementById('btn-auth-action').innerText = isReg ? "TẠO TÀI KHOẢN" : "VÀO HỆ THỐNG";
        document.getElementById('auth-switch').innerHTML = isReg ? 
            '<span class="link-sub" onclick="toggleAuthMode(false)">Đã có tài khoản? Đăng nhập</span>' :
            '<span class="link-sub" onclick="toggleAuthMode(true)">Chưa có tài khoản? Đăng ký</span><br><span class="link-sub" onclick="alert(\'Liên hệ Zalo Admin!\')">Quên mật khẩu?</span>';
    }

    function handleAuth() {
        const user = document.getElementById('auth-user').value.trim();
        const pass = document.getElementById('auth-pass').value.trim();
        if(!user || !pass) return alert("Vui lòng nhập đủ thông tin!");

        if(isRegisterMode) {
            localStorage.setItem('user_' + user, pass);
            alert("Đăng ký thành công! Hãy đăng nhập.");
            toggleAuthMode(false);
        } else {
            const savedPass = localStorage.getItem('user_' + user);
            if(savedPass === pass) {
                currentUser = user;
                document.getElementById('display-name').innerText = user;
                document.getElementById('auth-screen').style.display = 'none';
                document.getElementById('home').style.display = 'block';
                alert("Chào mừng " + user + " quay trở lại!");
            } else { alert("Sai tài khoản hoặc mật khẩu!"); }
        }
    }

    function logout() { location.reload(); }

    // XỬ LÝ ĐƠN HÀNG & LINK
    function openSv(name) {
        document.getElementById('home').style.display = 'none';
        document.getElementById('service-detail').style.display = 'block';
        document.getElementById('sv-title').innerText = "Tăng " + name;
    }

    function validateAndOrder() {
        const link = document.getElementById('link-tiktok').value;
        const amount = document.getElementById('amount').value;
        
        // Check link TikTok chuẩn
        if(!link.includes("tiktok.com")) {
            return alert("LỖI: Link không đúng định dạng TikTok! Vui lòng kiểm tra lại.");
        }
        if(!amount || amount <= 0) return alert("Vui lòng nhập số lượng!");

        alert("Đã nhận đơn! Hệ thống đang xử lý cho tài khoản: " + currentUser);
        goHome();
    }

    // ADMIN & NAVIGATION
    function adminClick() {
        adCount++;
        if(adCount >= 10) { 
            adCount = 0; 
            document.getElementById('home').style.display = 'none';
            document.getElementById('admin-login').style.display = 'block'; 
        }
    }

    function checkAdmin() {
        if(document.getElementById('ad-pass').value === "HuySMM@2026#Vip") {
            document.getElementById('admin-login').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'block';
        } else { alert("Sai mật khẩu!"); }
    }

    function goHome() {
        document.querySelectorAll('.panel, #home').forEach(el => el.style.display = 'none');
        document.getElementById('home').style.display = 'block';
    }

    function toggleSide() { 
        document.getElementById('side').classList.toggle('active');
        document.getElementById('over').style.display = document.getElementById('side').classList.contains('active') ? 'block' : 'none';
    }

    function showPopup(id) { document.getElementById(id).style.display = 'block'; document.getElementById('over').style.display = 'block'; }
    function closeAll() { document.querySelectorAll('.popup, .sidebar, .overlay').forEach(el => { el.style.display = 'none'; el.classList.remove('active'); }); }
</script>
</body>
</html>
